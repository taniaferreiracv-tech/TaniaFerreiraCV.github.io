<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tania Ferreira | Product & Project Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-light-gray: #ecebeb;
            --bg-white: #ffffff;
            --primary-green: #4b7766;
            --text-dark: #2c3230;
            --text-muted: #656d6a;
            --progress-bg: #b9b6b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-white);
            line-height: 1.6;
        }

        /* --- HEADER SECTION --- */
        header {
            background-color: var(--bg-light-gray);
            padding: 80px 10%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
        }

        .profile-container {
            width: 380px;
            height: 380px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(10%);
        }

        .header-text {
            max-width: 500px;
        }

        .subtitle {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--primary-green);
            font-weight: 400;
            margin-bottom: 15px;
        }

        .contact-info {
            font-size: 0.9rem;
            color: var(--text-dark);
            line-height: 1.8;
        }

        /* --- SECTION GRID SYSTEM --- */
        .section-container {
            padding: 100px 10%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-container.white-bg {
            background-color: var(--bg-white);
        }

        .section-container.gray-bg {
            background-color: var(--bg-light-gray);
            grid-template-columns: 1fr;
            text-align: center;
            padding: 120px 15%;
        }

        .section-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--primary-green);
            font-weight: 400;
            line-height: 1.2;
        }

        /* --- TIMELINE / EXPERIENCE --- */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .timeline-item {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 30px;
        }

        .time-period {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
            padding-top: 2px;
        }

        .timeline-content h3 {
            font-size: 1.1rem;
            color: var(--primary-green);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .timeline-content .company {
            font-size: 0.95rem;
            font-style: italic;
            color: var(--text-dark);
            margin-bottom: 8px;
            display: block;
        }

        .timeline-content ul {
            list-style-type: none;
        }

        .timeline-content li {
            font-size: 0.9rem;
            color: var(--text-dark);
            margin-bottom: 6px;
            position: relative;
            padding-left: 12px;
        }
        .timeline-content li::before {
            content: "•";
            color: var(--primary-green);
            position: absolute;
            left: 0;
        }

        /* --- SKILLS & PROFICIENCIES --- */
        .skills-section {
            padding: 100px 10%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(280px, 1fr));
            gap: 45px;
        }

        .skill-group h3 {
            font-size: 1.1rem;
            color: #3d7d69;
            margin-bottom: 18px;
            letter-spacing: .5px;
        }

        .skill-group ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .skill-group ul li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .skill-group ul li::before {
            content: "•";
            color: #3d7d69;
            position: absolute;
            left: 0;
            font-size: 18px;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .tag {
            background: #edf5f2;
            color: #3d7d69;
            padding: 8px 14px;
            border-radius: 50px;
            font-size: .92rem;
            border: 1px solid rgba(61,125,105,.15);
        }

        .highlight-item {
            margin-bottom: 22px;
        }

        .highlight-item strong {
            display: block;
            font-size: 1.1rem;
            color: #3d7d69;
            margin-bottom: 5px;
        }

        .highlight-item span {
            color: #555;
            line-height: 1.6;
        }

        /* --- TESTIMONIAL / QUOTE --- */
        .quote-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.4rem;
            color: var(--text-dark);
            font-weight: 300;
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto 25px auto;
        }

        .quote-author {
            font-size: 0.95rem;
            color: var(--primary-green);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .quote-author span {
            font-weight: 400;
            color: var(--text-muted);
            display: block;
            margin-top: 4px;
        }

        /* --- RESPONSIVE LAYOUT (MOBILE) --- */
        @media (max-width: 900px) {
            header {
                flex-direction: column;
                padding: 50px 5%;
                text-align: center;
                gap: 40px;
            }
            .section-container, .skills-section {
                grid-template-columns: 1fr;
                padding: 60px 5%;
                gap: 30px;
            }
            .skills-grid {
                grid-template-columns: 1fr;
            }
            .timeline-item {
                grid-template-columns: 1fr;
                gap: 5px;
            }
            .time-period {
                margin-bottom: 5px;
            }
        }

        /* --- MAXIMUM ATS COMPATIBILITY MODE ON PRINT --- */
        @media print {
            body {
                background: #ffffff !important;
                color: #000000 !important;
                font-size: 10pt !important;
            }
            header, .section-container, .section-container.gray-bg, .skills-section {
                background: #ffffff !important;
                padding: 20px 0 !important;
                display: block !important;
            }
            .profile-container {
                display: none !important;
            }
            h1, .section-title h2, .timeline-content h3, .quote-author {
                color: #000000 !important;
            }
            .timeline-item {
                display: block !important;
                margin-bottom: 20px !important;
                page-break-inside: avoid;
            }
            .time-period {
                font-weight: bold !important;
                margin-bottom: 2px !important;
            }
        }
    </style>
</head>
<body>
